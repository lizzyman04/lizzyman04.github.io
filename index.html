<!DOCTYPE html>
<html lang="pt">

<head>

    <!-- META TAGS & SEO -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prazer, Arlindo! | Freelancer Especialista em TI e Programação</title>

    <!-- FAVICON -->
    <link rel="shortcut icon" href="./assets/img/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="./assets/img/favicon.ico">

    <!-- STYLESHEET -->
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/icons.css">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&family=Monoton&family=Poppins:wght@500&display=swap"
        rel="stylesheet">

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.2.6/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script src="./assets/js/main.js" defer></script>
</head>

<body>

    <!-- Before full loading -->
    <div class="loader">
        <div class="ball">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        <div class="message">É sua primeira vez aqui?</div>
    </div>

    <!-- Header -->
    <header>
        <div class="bar">
            <span class="first-span"></span>
            <span class="second-span"></span>
            <span class="third-span"></span>
        </div>
    </header>

    <div class="header">
        <div class="logo">
            <img src="./assets/img/favicon.ico" alt="">
        </div>
        <div class="x-bar">
            <span class="x-first-span"></span>
            <span class="x-second-span"></span>
        </div>
        <div class="nav-me">
            <button data-text="CURRÍCULO" id="open-about-me">CURRÍCULO</button>
            <button data-text="PORTFÓLIO" id="open-portfolio">PORTFÓLIO</button>
            <button data-text="INTROSPECÇÃO" id="open-introspection">INTROSPECÇÃO</button>
            <button data-text="CONECTE-ME" id="open-hire-me">CONECTE-ME</button>
        </div>
    </div>

    <!-- Main -->
    <main>

        <!-- Breaker (Swap sections) -->
        <div class="breaker"></div>
        <!-- Hero (Home) -->
        <section class="hero" id="home">
            <div class="particles" id="particles-js"></div>
            <div class="bg-img">
                <picture>
                    <source srcset="./assets/img/bg.webp" type="image/webp">
                    <img src="./assets/img/bg.webp" alt="">
                </picture>
            </div>
            <div class="social-media-links">
                <a href="https://github.com/Lizzyman04" class="github-link"><span
                        class="css-icon github-icon"></span></a>
                <a href="https://www.linkedin.com/in/arlindoabdul" class="linkedin-link" target="_blank"><span
                        class="css-icon linkedin-icon"></span></a>
                <a href="https://tudocomlizzyman.com" class="blog-link"><span class="css-icon blog-icon"></span></a>
                <a href="https://www.instagram.com/tudocomlizzyman" class="instagram-link" target="_blank"><span
                        class="css-icon instagram-icon"></span></a>
            </div>
            <div class="hi-container">
                <div class="hi">
                    <h1 class="hi-pleasure"><span class="name">Arlindo</span> Abdul</h1>
                    <div class="what-i-do">
                        Sou um
                        <span class="txt-rotate" data-period="2600"
                            data-rotate='[ " Freelancer.", " Desenvolvedor.", " Escritor.", " Tutor." ]'></span><span
                            class="slash">|</span>
                    </div>
                </div>
            </div>
            <div class="contact-links">
                <a href="mailto:admin@tudocomlizzyman.com" class="email-link"><span
                        class="css-icon email-icon"></span></a>
                <a href="https://t.me/lizzyman04" class="telegram-link" target="_blank"><span
                        class="css-icon telegram-icon"></span></a>
                <a href="https://wa.me/+258877603501" class="whatsapp-link" target="_blank"><span
                        class="css-icon whatsapp-icon"></span></a>
                <a href="tel:+258877603501" class="tel-link" target="_blank"><span class="css-icon tel-icon"></span></a>
            </div>
        </section>

        <!-- CURRÍCULO (Section to show my curriculum) -->
        <section class="me-section" id="about-me">
            <div class="section-heading">
                <h2 class="section-title">CURRÍCULO</h2>
                <p class="section-description">Get to know me</p>
                <div class="animated-bar"></div>
            </div>
            <div class="section-inner"></div>
        </section>

        <!-- PORTFÓLIO (Section to show my works) -->
        <section class="me-section" id="portfolio">
            <div class="section-heading">
                <h2 class="section-title">PORTFÓLIO</h2>
                <p class="section-description">Some of my works</p>
                <div class="animated-bar"></div>
            </div>
            <div class="section-inner"></div>
        </section>

        <!-- INTROSPECÇÃO (Section to show my opinion) -->
        <section class="me-section" id="introspection">
            <div class="section-heading">
                <h2 class="section-title">INTROSPECÇÃO</h2>
                <p class="section-description">How i see the world</p>
                <div class="animated-bar"></div>
            </div>
            <div class="section-inner"></div>
        </section>

        <!-- CONECTE-ME (Section to show my contact informations) -->
        <section class="me-section" id="hire-me">
            <div class="section-heading">
                <h2 class="section-title">CONECTE-ME</h2>
                <p class="section-description">Let's talk?</p>
                <div class="animated-bar"></div>
            </div>
            <div class="section-inner"></div>
        </section>
    </main>
</body>

</html>
